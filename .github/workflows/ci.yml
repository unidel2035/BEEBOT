name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ --select=E9,F63,F7,F82,I --no-fix

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r src/ -ll -q --skip B101,B311

  test:
    runs-on: ubuntu-latest
    env:
      WEB_PASSWORD: ci-test-password
      TELEGRAM_BOT_TOKEN: fake-token-for-ci
      GROQ_API_KEY: fake-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: >
          python -m pytest tests/
          --ignore=tests/test_delivery.py
          --ignore=tests/test_integration.py
          --ignore=tests/test_pdf_report.py
          --ignore=tests/test_web_api.py
          -v --tb=short
          -x

  deploy:
    needs: [lint, security, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ai-agent/BEEBOT
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
