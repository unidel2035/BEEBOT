name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ --select=E9,F63,F7,F82 --no-fix

  test:
    runs-on: ubuntu-latest
    env:
      WEB_PASSWORD: ci-test-password
      TELEGRAM_BOT_TOKEN: fake-token-for-ci
      GROQ_API_KEY: fake-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: >
          python -m pytest tests/
          --ignore=tests/test_delivery.py
          --ignore=tests/test_integration.py
          -v --tb=short
          -x
