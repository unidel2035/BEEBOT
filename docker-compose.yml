services:
  redis:
    image: redis:7-alpine
    container_name: beebot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  beebot:
    build: .
    container_name: beebot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/subtitles:/app/data/subtitles
      - ./data/texts:/app/data/texts
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beebot-web:
    build: .
    container_name: beebot-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    command: ["uvicorn", "src.web.server:app", "--host", "0.0.0.0", "--port", "8088"]
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8088/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
