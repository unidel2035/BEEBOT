services:
  beebot:
    build: .
    container_name: beebot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/subtitles:/app/data/subtitles
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beebot-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: beebot-web
    restart: unless-stopped
    ports:
      - "8088:8080"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
