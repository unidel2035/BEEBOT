# Nginx конфигурация для BEEBOT (Фаза 12.4)
# Требует: домен + Let's Encrypt сертификат
#
# Активация на VPS:
#   1. Установить nginx: apt install nginx
#   2. Установить certbot: apt install certbot python3-certbot-nginx
#   3. Заменить YOURDOMAIN.RU на реальный домен
#   4. Скопировать файл: cp nginx/beebot.conf /etc/nginx/sites-available/beebot
#   5. Включить: ln -s /etc/nginx/sites-available/beebot /etc/nginx/sites-enabled/
#   6. Получить SSL: certbot --nginx -d YOURDOMAIN.RU
#   7. Перезапустить: systemctl reload nginx

server {
    listen 80;
    server_name YOURDOMAIN.RU;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOURDOMAIN.RU;

    # SSL (certbot заменит пути автоматически)
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.RU/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.RU/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:!aNULL:!MD5:!3DES;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy to beebot-web (network_mode: host → localhost:8088)
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # SSE поддержка (для /api/sse)
        proxy_buffering off;
        proxy_cache off;
    }
}
